<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Directory | Ministry of Education, The Bahamas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --aqua:#00838f;--aqua-dark:#006064;--aqua-light:#e0f7fa;
  --gold:#f9a825;--gold-light:#fff8e1;
  --navy:#1a237e;
  --bg:#f5f7fa;--white:#fff;--text:#263238;--text-light:#546e7a;
  --border:#cfd8dc;--shadow:0 2px 8px rgba(0,0,0,.08);
  --radius:10px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;margin:0;padding:0}
a{color:var(--aqua);text-decoration:none}

/* ─── STATS BAR ─── */
.stats-bar{display:flex;gap:10px;padding:16px 20px;flex-wrap:wrap;justify-content:center;background:var(--white);border-bottom:1px solid var(--border)}
.stat{background:var(--aqua-light);color:var(--aqua-dark);border-radius:8px;padding:8px 16px;font-size:.82rem;text-align:center}
.stat strong{font-size:1.1rem;display:block;color:var(--navy)}

/* ─── SEARCH / FILTERS ─── */
.controls{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.controls-inner{display:flex;gap:12px;flex-wrap:wrap;align-items:center;max-width:1300px;margin:auto}
.search-box{flex:1 1 260px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;transition:border .2s}
.search-box input:focus{outline:none;border-color:var(--aqua)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-light)}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:.82rem;transition:all .2s;user-select:none}
.pill:hover{border-color:var(--aqua)}
.pill.active{background:var(--aqua);color:#fff;border-color:var(--aqua)}
.result-count{font-size:.82rem;color:var(--text-light);white-space:nowrap}

/* ─── MAIN CONTENT ─── */
.main{max-width:1300px;margin:0 auto;padding:18px 20px 40px}

/* ─── DISTRICT CARD ─── */
.district{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border:1px solid var(--border);transition:box-shadow .2s}
.district:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.district-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;gap:12px;user-select:none}
.district-header:hover{background:var(--aqua-light)}
.district-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.district-badge{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--aqua),var(--aqua-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.district-name{font-size:1.05rem;font-weight:600}
.district-meta{font-size:.8rem;color:var(--text-light);margin-top:2px}
.school-count-badge{background:var(--aqua-light);color:var(--aqua-dark);padding:3px 10px;border-radius:14px;font-size:.78rem;font-weight:600;white-space:nowrap}
.chevron{transition:transform .3s;color:var(--text-light);flex-shrink:0}
.district.open .chevron{transform:rotate(180deg)}

/* ─── DISTRICT OFFICE INFO ─── */
.district-body{display:none;border-top:1px solid var(--border)}
.district.open .district-body{display:block}
.office-info{background:var(--gold-light);padding:14px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;border-bottom:1px solid #f0e6c0}
.office-info-item{font-size:.85rem}
.office-info-item .label{font-weight:600;display:block;margin-bottom:2px;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light)}
.office-info-item .value{color:var(--text)}
.placeholder{color:#b0bec5;font-style:italic}

/* ─── SCHOOL GRID ─── */
.schools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px 16px}
.school-card{display:flex;gap:12px;padding:12px;border-radius:8px;border:1px solid var(--border);transition:all .2s;background:var(--white)}
.school-card:hover{border-color:var(--aqua);box-shadow:0 2px 10px rgba(0,131,143,.1)}
.school-crest{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--aqua-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.school-crest svg{width:26px;height:26px;fill:#fff;opacity:.85}
.school-info{min-width:0;flex:1}
.school-name{font-weight:600;font-size:.88rem;margin-bottom:3px;line-height:1.3}
.school-type{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.type-primary{background:#e8f5e9;color:#2e7d32}
.type-secondary{background:#e3f2fd;color:#1565c0}
.type-all-age{background:#f3e5f5;color:#7b1fa2}
.type-pre-primary{background:#fff3e0;color:#e65100}
.type-special{background:#fce4ec;color:#c62828}
.school-detail{font-size:.8rem;color:var(--text-light);display:flex;align-items:flex-start;gap:5px;margin-top:3px;line-height:1.4}
.school-detail svg{width:13px;height:13px;flex-shrink:0;margin-top:2px;opacity:.6}
.no-results{text-align:center;padding:40px 20px;color:var(--text-light);font-size:.95rem}

/* ─── RESPONSIVE ─── */
@media(max-width:600px){
  .schools-grid{grid-template-columns:1fr;padding:10px}
  .office-info{grid-template-columns:1fr}
  .district-header{padding:12px 14px}
  .stats-bar{gap:6px;padding:12px 14px}
  .stat{padding:6px 10px;font-size:.78rem}
  .stat strong{font-size:.95rem}
  .controls{padding:10px 14px}
}

/* ─── PRINT ─── */
@media print{
  .controls{position:static;box-shadow:none}
  .district-body{display:block!important}
  .chevron{display:none}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.school-card{animation:fadeIn .3s ease}
</style>
</head>

const DISTRICT_ORDER=["Abaco","Andros & The Berry Islands","Eastern New Providence Primary","ECLR (Exuma, Cat Island, Long Island, Ragged Island)","Eleuthera","Grand Bahama & Bimini","Northern New Providence Secondary","South Central Bahamas","Southern New Providence Secondary","Western New Providence Primary"];

const CREST_SVG=`<svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.25 3.83 10.16 9 11.27 5.17-1.11 9-6.02 9-11.27V7l-9-5z"/></svg>`;
const PIN_SVG=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const PHONE_SVG=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
const ISLAND_SVG=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
const CHEVRON_SVG=`<svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;

function typeClass(t){return 'type-'+t.toLowerCase().replace(/[\s-]/g,'-')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let activeFilter='all',searchTerm='';

function render(){
  const c=document.getElementById('districtContainer');
  let html='',total=0;
  for(const dn of DISTRICT_ORDER){
    const schools=(DATA[dn]||[]).filter(s=>{
      if(activeFilter!=='all'&&s.t!==activeFilter)return false;
      if(searchTerm){const q=searchTerm.toLowerCase();return s.n.toLowerCase().includes(q)||s.i.toLowerCase().includes(q)||s.s.toLowerCase().includes(q)||s.a.toLowerCase().includes(q)}
      return true;
    });
    if(!schools.length)continue;
    total+=schools.length;
    const ini=dn.split(/[\s&(]+/).filter(w=>w.length>1).slice(0,2).map(w=>w[0]).join('');
    html+=`<div class="district" id="dist-${dn.replace(/\W/g,'')}">
      <div class="district-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="district-left">
          <div class="district-badge">${ini}</div>
          <div><div class="district-name">${esc(dn)}</div><div class="district-meta">${schools.length} school${schools.length!==1?'s':''}</div></div>
        </div>
        <span class="school-count-badge">${schools.length} school${schools.length!==1?'s':''}</span>
        ${CHEVRON_SVG}
      </div>
      <div class="district-body">
        <div class="office-info">
          <div class="office-info-item"><span class="label">District Superintendent</span><span class="value placeholder">[Superintendent Name]</span></div>
          <div class="office-info-item"><span class="label">District Education Officer</span><span class="value placeholder">[Education Officer Name]</span></div>
          <div class="office-info-item"><span class="label">Office Location</span><span class="value placeholder">[Office Address]</span></div>
          <div class="office-info-item"><span class="label">Office Telephone</span><span class="value placeholder">[Office Phone Number]</span></div>
        </div>
        <div class="schools-grid">`;
    for(const s of schools){
      const addr=s.a.replace(/\s{2,}/g,', ');
      html+=`<div class="school-card">
        <div class="school-crest">${CREST_SVG}</div>
        <div class="school-info">
          <div class="school-name">${esc(s.n)}</div>
          ${s.t?`<span class="school-type ${typeClass(s.t)}">${esc(s.t)}</span>`:''}
          ${addr?`<div class="school-detail">${PIN_SVG} <span>${esc(addr)}</span></div>`:''}
          ${s.i?`<div class="school-detail">${ISLAND_SVG} <span>${esc(s.i)}${s.s?', '+esc(s.s):''}</span></div>`:''}
          ${s.p?`<div class="school-detail">${PHONE_SVG} <span>${esc(s.p)}</span></div>`:''}
        </div>
      </div>`;
    }
    html+=`</div></div></div>`;
  }
  if(!total)html=`<div class="no-results">No schools match your search. Try a different term or filter.</div>`;
  c.innerHTML=html;
  document.getElementById('resultCount').textContent=total+' school'+(total!==1?'s':'');
}

document.getElementById('filterPills').addEventListener('click',e=>{
  const p=e.target.closest('.pill');if(!p)return;
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');activeFilter=p.dataset.filter;render();
});

let st;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(st);st=setTimeout(()=>{
    searchTerm=e.target.value.trim();render();
    if(searchTerm)document.querySelectorAll('.district').forEach(d=>d.classList.add('open'));
  },200);
});

render();
const first=document.querySelector('.district');if(first)first.classList.add('open');
</script>
